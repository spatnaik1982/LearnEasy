conceptId: basic_shapes
chapter:
  code: CH2
  name: Shapes
learningObjective: "Identify basic shapes: circle, square, triangle, rectangle"
coreIdea: "Each shape has a unique form and name"
examples:
  - "A circle is round like a ball"
  - "A square has four equal sides"
misconceptions:
  - "Calling a rectangle a square"
  - "Calling an oval a circle"
supports:
  visual: true
masteryCriteria: 0.8
difficulty: "beginner"
estimatedDuration: 15
dependencies: []
activities:
  - step: "observe"
    type: "visual_counting"
    order: 1
    content:
      description: "Look at the shapes"
      shapes: ["⬤", "■", "▲", "▬"]
      text: "Circle, Square, Triangle, Rectangle"
      hints:
        - "The circle is round ⬤. The square has four sides ■."
        - "Look at each shape and its name carefully."
        - "You're close! Notice which shapes are round and which have corners."
        - "Try saying each shape's name out loud."
        - ""
  - step: "guided_practice"
    type: "matching"
    order: 2
    content:
      description: "Match shape to its name"
      pairs:
        - shape: "⬤"
          name: "Circle"
        - shape: "■"
          name: "Square"
      hints:
        - "The round ⬤ matches with 'Circle'. Let me show you."
        - "Look at the round shape first — that's a circle."
        - "You're close! Match the round shape to its name."
        - "Try saying the names: round = circle, four sides = square."
        - ""
  - step: "independent_practice"
    type: "matching"
    order: 3
    content:
      description: "Match shapes on your own"
      pairs:
        - shape: "▲"
          name: "Triangle"
        - shape: "▬"
          name: "Rectangle"
  - step: "mastery_check"
    type: "multiple_choice"
    order: 4
    content:
      questions:
        - question: "Which shape is a circle?"
          options: ["⬤", "■", "▲", "▬"]
          correctIndex: 0
        - question: "Which shape is a triangle?"
          options: ["⬤", "■", "▲", "▬"]
          correctIndex: 2
  - step: "positive_completion"
    type: "matching"
    order: 5
    content:
      message: "Great job! You know your shapes."
      encouragement: true

# ─── Concept Metadata ─────────────────────────────────────────────

conceptId: numbers_1_9
chapter:
  code: CH1
  name: "Reading, Understanding, Forming and Writing Numbers"

learningObjective: "Read and count numbers from 1 to 9 using objects"
coreIdea: "Numbers from 1 to 9 tell us how many objects there are"

examples:
  - "One apple is 1: 🍎"
  - "Three stars is 3: ⭐⭐⭐"

misconceptions:
  - "Thinking 0 means 1"
  - "Skipping numbers while counting objects"

supports:
  visual: true

masteryCriteria: 0.8
difficulty: beginner
estimatedDuration: 15
dependencies: []

# ─── Activities (5 required steps) ─────────────────────────────────

activities:
  - step: observe
    type: visual_counting
    order: 1
    content:
      description: "Observe the keys"
      items: ["🔑"]
      count: 5
      text: "Look! There are five keys. 1, 2, 3, 4, 5."

  - step: guided_practice
    type: visual_counting
    order: 2
    content:
      description: "Count the houses"
      items: ["🏠"]
      count: 7
      hint: "Let's count each house slowly."
      hints:
        - "Hint 1: Point to each house."
        - "Hint 2: You're close! Start with 1."
        - ""

  - step: independent_practice
    type: drag_drop
    order: 3
    content:
      description: "Match the number of people"
      groups:
        - label: "4 People"
          target: ["🧑", "🧑", "🧑", "🧑"]
        - label: "2 People"
          target: ["🧑", "🧑"]
      items: ["🧑", "🧑", "🧑", "🧑", "🧑", "🧑"]

  - step: mastery_check
    type: multiple_choice
    order: 4
    content:
      questions:
        - question: "How many cats? 🐱🐱🐱"
          options: ["1", "2", "3", "4"]
          correctIndex: 2
        - question: "How many balls? ⚽⚽⚽⚽⚽⚽"
          options: ["4", "5", "6", "7"]
          correctIndex: 2

  - step: positive_completion
    type: visual_counting
    order: 5
    content:
      message: "Wonderful! You are great at counting!"
      encouragement: true
conceptId: addition_1_10
chapter:
  code: CH3
  name: Addition
learningObjective: "Add two numbers with sum up to 10"
coreIdea: "Adding means putting groups together to find the total"
examples:
  - "2 apples plus 1 apple equals 3 apples"
  - "3 stars plus 2 stars equals 5 stars"
misconceptions:
  - "Counting the first group again"
  - "Forgetting to include all objects"
supports:
  visual: true
masteryCriteria: 0.8
difficulty: "beginner"
estimatedDuration: 15
dependencies: ["counting_1_10", "number_recognition_1_10"]
activities:
  - step: "observe"
    type: "visual_counting"
    order: 1
    content:
      description: "Adding apples"
      left: ["🍎", "🍎"]
      right: ["🍎"]
      sum: 3
      text: "Two apples plus one apple equals three apples."
  - step: "guided_practice"
    type: "visual_counting"
    order: 2
    content:
      description: "Add the stars"
      left: ["⭐", "⭐", "⭐"]
      right: ["⭐", "⭐"]
      sum: 5
      hint: "Count all the stars together."
  - step: "independent_practice"
    type: "visual_counting"
    order: 3
    content:
      description: "Add the flowers"
      left: ["🌸", "🌸"]
      right: ["🌸", "🌸", "🌸"]
      sum: 5
  - step: "mastery_check"
    type: "multiple_choice"
    order: 4
    content:
      questions:
        - question: "2 + 1 = ?"
          options: ["2", "3", "4", "5"]
          correctIndex: 1
        - question: "3 + 2 = ?"
          options: ["4", "5", "6", "7"]
          correctIndex: 1
  - step: "positive_completion"
    type: "visual_counting"
    order: 5
    content:
      message: "Great work! You can add numbers."
      encouragement: true

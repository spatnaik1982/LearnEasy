conceptId: subtraction_1_10
chapter:
  code: CH4
  name: Subtraction
learningObjective: "Subtract numbers with difference up to 10"
coreIdea: "Subtraction means taking away some objects to find how many are left"
examples:
  - "3 apples take away 1 apple leaves 2 apples"
  - "5 stars take away 2 stars leaves 3 stars"
misconceptions:
  - "Subtracting a larger number from a smaller one"
  - "Counting taken-away objects as remaining"
supports:
  visual: true
masteryCriteria: 0.8
difficulty: "beginner"
estimatedDuration: 15
dependencies: ["counting_1_10", "number_recognition_1_10", "addition_1_10"]
activities:
  - step: "observe"
    type: "visual_counting"
    order: 1
    content:
      description: "Taking away apples"
      total: ["🍎", "🍎", "🍎"]
      takeAway: 1
      remaining: 2
      text: "Three apples, take one away. Two apples remain."
  - step: "guided_practice"
    type: "visual_counting"
    order: 2
    content:
      description: "Subtract the stars"
      total: 5
      takeAway: 2
      hint: "Count the stars that are left."
  - step: "independent_practice"
    type: "visual_counting"
    order: 3
    content:
      description: "Subtract the flowers"
      total: 4
      takeAway: 1
  - step: "mastery_check"
    type: "multiple_choice"
    order: 4
    content:
      questions:
        - question: "3 - 1 = ?"
          options: ["1", "2", "3", "4"]
          correctIndex: 1
        - question: "5 - 2 = ?"
          options: ["2", "3", "4", "5"]
          correctIndex: 1
  - step: "positive_completion"
    type: "visual_counting"
    order: 5
    content:
      message: "Great work! You can subtract numbers."
      encouragement: true

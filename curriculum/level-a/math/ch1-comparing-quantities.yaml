conceptId: comparing_quantities
chapter:
  code: CH1
  name: Numbers
learningObjective: "Compare which group has more or fewer objects"
coreIdea: "One group can have more or fewer objects than another"
examples:
  - "3 apples is more than 1 apple"
  - "2 stars is fewer than 5 stars"
misconceptions:
  - "Thinking bigger objects mean more"
  - "Confusing more and fewer"
supports:
  visual: true
masteryCriteria: 0.8
difficulty: "beginner"
estimatedDuration: 15
dependencies: ["counting_1_10"]
activities:
  # Step 1 — Observe: shows two groups of apples side-by-side
  - step: "observe"
    type: "visual_counting"
    order: 1
    content:
      description: "Compare groups of apples"
      left: ["🍎", "🍎", "🍎"]
      right: ["🍎"]
      text: "Three apples is more than one apple."

  # Step 2 — Guided practice: story scenario with graduated hints
  - step: "guided_practice"
    type: "story_question"
    order: 2
    content:
      description: "Compare groups of stars"
      scenario: "There are two groups of stars. The left group has 5 stars ⭐⭐⭐⭐⭐. The right group has 2 stars ⭐⭐."
      questions:
        - question: "Which group has more stars?"
          options: ["Left group", "Right group", "Both are the same"]
          correctIndex: 0
        - question: "Which group has fewer stars?"
          options: ["Left group", "Right group", "Both are the same"]
          correctIndex: 1
      hints:
        - "Count the stars in each group."
        - "The group with more stars has a bigger number."
        - "5 stars is more than 2 stars."

  # Step 3 — Independent practice: story scenario, no hints
  - step: "independent_practice"
    type: "story_question"
    order: 3
    content:
      description: "Compare groups of flowers"
      scenario: "There are two groups of flowers. The left group has 1 flower 🌸. The right group has 4 flowers 🌸🌸🌸🌸."
      questions:
        - question: "Which group has more flowers?"
          options: ["Left group", "Right group", "Both are the same"]
          correctIndex: 1
        - question: "Which group has fewer flowers?"
          options: ["Left group", "Right group", "Both are the same"]
          correctIndex: 0

  # Step 4 — Mastery check: self-contained questions, no visual dependency
  - step: "mastery_check"
    type: "multiple_choice"
    order: 4
    content:
      questions:
        - question: "A bowl has 3 circles and another bowl has 1 circle. Which bowl has more circles?"
          options: ["The bowl with 3", "The bowl with 1", "Both are the same"]
          correctIndex: 0
        - question: "A jar has 5 stars and another jar has 3 stars. Which jar has fewer stars?"
          options: ["The jar with 5", "The jar with 3", "Both are the same"]
          correctIndex: 1

  # Step 5 — Positive completion (handled by PositiveCompletion component)
  - step: "positive_completion"
    type: "visual_counting"
    order: 5
    content:
      message: "Great work! You know how to compare."
      encouragement: true

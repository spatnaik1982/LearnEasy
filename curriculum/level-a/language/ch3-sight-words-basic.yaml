conceptId: sight_words_basic
chapter:
  code: CH3
  name: Sight Words
learningObjective: "Read basic sight words: I, a, the, is, it"
coreIdea: "Some words you know just by looking"
examples:
  - "The word 'I' is the letter I"
  - "The word 'a' is just the letter a"
misconceptions:
  - "Trying to sound out sight words"
  - "Confusing 'is' and 'it'"
supports:
  visual: true
masteryCriteria: 0.8
difficulty: "beginner"
estimatedDuration: 15
dependencies: ["letter_recognition_a_e"]
activities:
  - step: "observe"
    type: "visual_counting"
    order: 1
    content:
      description: "Look at these sight words"
      items: ["I", "a", "the", "is", "it"]
      count: 5
      text: "These are words you see often."
  - step: "guided_practice"
    type: "matching"
    order: 2
    content:
      description: "Match sight word to its picture"
      pairs:
        - itemA: "I"
          itemB: "🙋"
        - itemA: "a"
          itemB: "🍎"
  - step: "independent_practice"
    type: "matching"
    order: 3
    content:
      description: "Match sight words on your own"
      pairs:
        - itemA: "the"
          itemB: "The sun"
        - itemA: "is"
          itemB: "It is big"
        - itemA: "it"
          itemB: "It is fun"
  - step: "mastery_check"
    type: "multiple_choice"
    order: 4
    content:
      questions:
        - question: "Which word says 'I'?"
          options: ["I", "a", "the"]
          correctIndex: 0
        - question: "Which word says 'the'?"
          options: ["I", "a", "the"]
          correctIndex: 2
  - step: "positive_completion"
    type: "visual_counting"
    order: 5
    content:
      message: "Great work reading sight words!"
      encouragement: true

conceptId: letter_recognition_a_e
chapter:
  code: CH1
  name: Letter Recognition
learningObjective: "Identify letters A through E by name"
coreIdea: "Each letter has a name and a sound"
examples:
  - "The letter A looks like this: A"
  - "The letter A says /a/ as in apple"
misconceptions:
  - "Confusing letter b and letter d"
  - "Mixing letter names and sounds"
supports:
  visual: true
  audio: true
masteryCriteria: 0.8
difficulty: "beginner"
estimatedDuration: 15
dependencies: []
activities:
  - step: "observe"
    type: "visual_counting"
    order: 1
    content:
      description: "Look at letters A, B, C, D, E"
      items: ["A", "B", "C", "D", "E"]
      count: 5
      text: "These are the first five letters."
      hints:
        - "These are letters A, B, C, D, E. A is the first letter."
        - "Look at each letter's shape carefully."
        - "You're close! Notice how each letter looks different."
        - "Try saying each letter's name out loud."
        - ""
  - step: "guided_practice"
    type: "matching"
    order: 2
    content:
      description: "Match each letter to its name"
      pairs:
        - itemA: "A"
          itemB: "Ay"
        - itemA: "B"
          itemB: "Bee"
      hints:
        - "The letter A matches with 'Ay'. Let me show you."
        - "Look at the letter A — its name is 'Ay'."
        - "You're close! Match the first letter A to 'Ay'."
        - "Try saying the names: A says 'Ay', B says 'Bee'."
        - ""
  - step: "independent_practice"
    type: "matching"
    order: 3
    content:
      description: "Match letters on your own"
      pairs:
        - itemA: "C"
          itemB: "See"
        - itemA: "D"
          itemB: "Dee"
        - itemA: "E"
          itemB: "Ee"
  - step: "mastery_check"
    type: "multiple_choice"
    order: 4
    content:
      questions:
        - question: "Which letter is A?"
          options: ["A", "B", "C"]
          correctIndex: 0
        - question: "Which letter comes after A?"
          options: ["A", "B", "C"]
          correctIndex: 1
  - step: "positive_completion"
    type: "visual_counting"
    order: 5
    content:
      message: "Great work learning letters A to E!"
      encouragement: true

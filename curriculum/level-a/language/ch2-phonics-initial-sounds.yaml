conceptId: phonics_initial_sounds
chapter:
  code: CH2
  name: Phonics
learningObjective: "Identify the first sound in simple words"
coreIdea: "Words start with different sounds"
examples:
  - "Apple starts with /a/ sound"
  - "Ball starts with /b/ sound"
misconceptions:
  - "Hearing middle sounds instead of first"
  - "Confusing /b/ and /p/ sounds"
supports:
  visual: true
  audio: true
masteryCriteria: 0.8
difficulty: "beginner"
estimatedDuration: 15
dependencies: ["letter_recognition_a_e"]
activities:
  - step: "observe"
    type: "visual_counting"
    order: 1
    content:
      description: "See and hear first sounds"
      items: ["🍎", "⚽", "🐱"]
      text: "Apple starts with /a/. Ball starts with /b/."
  - step: "guided_practice"
    type: "matching"
    order: 2
    content:
      description: "Match picture to first sound"
      pairs:
        - itemA: "🍎"
          itemB: "/a/"
        - itemA: "⚽"
          itemB: "/b/"
  - step: "independent_practice"
    type: "matching"
    order: 3
    content:
      description: "Match pictures on your own"
      pairs:
        - itemA: "🐱"
          itemB: "/c/"
        - itemA: "🐕"
          itemB: "/d/"
  - step: "mastery_check"
    type: "multiple_choice"
    order: 4
    content:
      questions:
        - question: "What sound does apple start with?"
          options: ["/a/", "/b/", "/c/"]
          correctIndex: 0
        - question: "What sound does ball start with?"
          options: ["/a/", "/b/", "/c/"]
          correctIndex: 1
  - step: "positive_completion"
    type: "visual_counting"
    order: 5
    content:
      message: "Great work finding first sounds!"
      encouragement: true

conceptId: picture_story_order
chapter:
  code: CH6
  name: Basic Comprehension
learningObjective: "Arrange picture cards in story order"
coreIdea: "Pictures tell a story in the right order"
examples:
  - "First a seed, then a plant, then a flower"
  - "First an egg, then a chick, then a chicken"
misconceptions:
  - "Starting the story at the wrong place"
  - "Skipping important steps in the story"
supports:
  visual: true
masteryCriteria: 0.8
difficulty: "beginner"
estimatedDuration: 15
dependencies: ["print_awareness"]
activities:
  - step: "observe"
    type: "sequencing"
    order: 1
    content:
      description: "See a story in three steps"
      cards: ["🌱", "🌿", "🌸"]
      text: "Seed grows into plant. Plant grows flowers."
  - step: "guided_practice"
    type: "sequencing"
    order: 2
    content:
      description: "Put the story in order"
      cards: ["🥚", "🐣", "🐔"]
      hint: "What comes first, next, and last?"
  - step: "independent_practice"
    type: "matching"
    order: 3
    content:
      description: "Match each step to its order"
      pairs:
        - itemA: "First"
          itemB: "🌱"
        - itemA: "Next"
          itemB: "🌿"
        - itemA: "Last"
          itemB: "🌸"
  - step: "mastery_check"
    type: "multiple_choice"
    order: 4
    content:
      questions:
        - question: "What comes first in the seed story?"
          options: ["🌱", "🌿", "🌸"]
          correctIndex: 0
        - question: "What comes last in the seed story?"
          options: ["🌱", "🌿", "🌸"]
          correctIndex: 2
  - step: "positive_completion"
    type: "visual_counting"
    order: 5
    content:
      message: "Great work putting stories in order!"
      encouragement: true

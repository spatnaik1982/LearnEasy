conceptId: letter_recognition_f_j
chapter:
  code: CH1
  name: Letter Recognition
learningObjective: "Identify letters F through J by name"
coreIdea: "Each letter has a name and a sound"
examples:
  - "The letter F looks like this: F"
  - "The letter F says /f/ as in fish"
misconceptions:
  - "Confusing letter p and letter q"
  - "Mixing letter shapes that look alike"
supports:
  visual: true
  audio: true
masteryCriteria: 0.8
difficulty: "beginner"
estimatedDuration: 15
dependencies: ["letter_recognition_a_e"]
activities:
  - step: "observe"
    type: "visual_counting"
    order: 1
    content:
      description: "Look at letters F, G, H, I, J"
      items: ["F", "G", "H", "I", "J"]
      count: 5
      text: "These are the next five letters."
  - step: "guided_practice"
    type: "matching"
    order: 2
    content:
      description: "Match each letter to its name"
      pairs:
        - itemA: "F"
          itemB: "Ef"
        - itemA: "G"
          itemB: "Jee"
  - step: "independent_practice"
    type: "matching"
    order: 3
    content:
      description: "Match letters on your own"
      pairs:
        - itemA: "H"
          itemB: "Aych"
        - itemA: "I"
          itemB: "Eye"
        - itemA: "J"
          itemB: "Jay"
  - step: "mastery_check"
    type: "multiple_choice"
    order: 4
    content:
      questions:
        - question: "Which letter is F?"
          options: ["F", "G", "H"]
          correctIndex: 0
        - question: "Which letter comes after F?"
          options: ["F", "G", "H"]
          correctIndex: 1
  - step: "positive_completion"
    type: "visual_counting"
    order: 5
    content:
      message: "Great work learning letters F to J!"
      encouragement: true

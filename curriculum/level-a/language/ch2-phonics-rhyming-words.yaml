conceptId: phonics_rhyming_words
chapter:
  code: CH2
  name: Phonics
learningObjective: "Identify words that rhyme"
coreIdea: "Rhyming words have the same ending sound"
examples:
  - "Cat and hat rhyme together"
  - "Dog and log rhyme together"
misconceptions:
  - "Thinking words that start the same rhyme"
  - "Confusing rhyme with alliteration"
supports:
  visual: true
  audio: true
masteryCriteria: 0.8
difficulty: "beginner"
estimatedDuration: 15
dependencies: ["phonics_initial_sounds"]
activities:
  - step: "observe"
    type: "visual_counting"
    order: 1
    content:
      description: "See words that rhyme"
      items: ["🐱", "🎩"]
      text: "Cat and hat. They rhyme."
  - step: "guided_practice"
    type: "matching"
    order: 2
    content:
      description: "Match words that rhyme"
      pairs:
        - itemA: "🐱"
          itemB: "🎩"
        - itemA: "🪵"
          itemB: "🐕"
  - step: "independent_practice"
    type: "matching"
    order: 3
    content:
      description: "Find rhyming pairs on your own"
      pairs:
        - itemA: "🔔"
          itemB: "🛎️"
        - itemA: "🌙"
          itemB: "🥄"
  - step: "mastery_check"
    type: "multiple_choice"
    order: 4
    content:
      questions:
        - question: "Which word rhymes with cat?"
          options: ["Hat", "Car", "Cup"]
          correctIndex: 0
        - question: "Which word rhymes with dog?"
          options: ["Door", "Log", "Dot"]
          correctIndex: 1
  - step: "positive_completion"
    type: "visual_counting"
    order: 5
    content:
      message: "Great work finding rhyming words!"
      encouragement: true

conceptId: family_members
chapter:
  code: CH2
  name: My Family
learningObjective: "Identify family members and their roles"
coreIdea: "Each family member has a name and a role"
examples:
  - "Mother takes care of the family"
  - "Father goes to work"
misconceptions:
  - "Thinking all families are the same size"
supports:
  visual: true
masteryCriteria: 0.8
difficulty: "beginner"
estimatedDuration: 15
dependencies: []
activities:
  - step: "observe"
    type: "visual_counting"
    order: 1
    content:
      description: "Meet a family"
      items: ["👩", "👨", "👧", "👦"]
      count: 4
      text: "Mother, Father, Sister, Brother."
      hints:
        - "Mother 👩 takes care of you. Father 👨 works. Sister 👧 and Brother 👦 are your siblings."
        - "Look at each person — what role do they have?"
        - "You're close! Notice: mother and father are parents, sister and brother are children."
        - "Try saying the names: Mother, Father, Sister, Brother."
        - ""
  - step: "guided_practice"
    type: "matching"
    order: 2
    content:
      description: "Match family member to role"
      pairs:
        - itemA: "👩"
          itemB: "Mother"
        - itemA: "👨"
          itemB: "Father"
      hints:
        - "The woman 👩 is the Mother. The man 👨 is the Father."
        - "Look at the first person 👩 — that is your mother."
        - "You're close! Match 👩 with 'Mother' and 👨 with 'Father'."
        - "Think about who takes care of you at home."
        - ""
  - step: "independent_practice"
    type: "multiple_choice"
    order: 3
    content:
      questions:
        - question: "Who is the mother?"
          options: ["👨", "👩", "👦"]
          correctIndex: 1
  - step: "mastery_check"
    type: "multiple_choice"
    order: 4
    content:
      questions:
        - question: "Who takes care of you at home?"
          options: ["Stranger", "Mother", "Teacher"]
          correctIndex: 1
        - question: "Who is a sibling?"
          options: ["Mother", "Brother", "Doctor"]
          correctIndex: 1
  - step: "positive_completion"
    type: "visual_counting"
    order: 5
    content:
      message: "Great! You know your family members."
      encouragement: true

conceptId: plants_and_animals
chapter:
  code: CH1
  name: Living Things
learningObjective: "Identify common plants and animals"
coreIdea: "Plants and animals are living things around us"
examples:
  - "A tree is a common plant"
  - "A dog is a common animal"
misconceptions:
  - "Calling a mushroom a plant"
supports:
  visual: true
masteryCriteria: 0.8
difficulty: "beginner"
estimatedDuration: 15
dependencies: []
activities:
  - step: "observe"
    type: "visual_counting"
    order: 1
    content:
      description: "Look at plants and animals"
      items: ["🌳", "🌻", "🐱", "🐦"]
      count: 4
      text: "These are living things."
  - step: "guided_practice"
    type: "matching"
    order: 2
    content:
      description: "Match each as plant or animal"
      pairs:
        - itemA: "🌳"
          itemB: "Plant"
        - itemA: "🐱"
          itemB: "Animal"
  - step: "independent_practice"
    type: "multiple_choice"
    order: 3
    content:
      questions:
        - question: "Which is a plant?"
          options: ["🐕", "🌻", "🐦"]
          correctIndex: 1
  - step: "mastery_check"
    type: "multiple_choice"
    order: 4
    content:
      questions:
        - question: "Which is an animal?"
          options: ["🌳", "🌻", "🐕"]
          correctIndex: 2
        - question: "What do plants need to grow?"
          options: ["Sunlight", "Toys", "Books"]
          correctIndex: 0
  - step: "positive_completion"
    type: "visual_counting"
    order: 5
    content:
      message: "Nice! You can identify plants and animals."
      encouragement: true

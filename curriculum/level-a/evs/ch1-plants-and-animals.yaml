conceptId: plants_and_animals
chapter:
  code: CH1
  name: Living Things
learningObjective: "Identify common plants and animals"
coreIdea: "Plants and animals are living things around us"
examples:
  - "A tree is a common plant"
  - "A dog is a common animal"
misconceptions:
  - "Calling a mushroom a plant"
supports:
  visual: true
masteryCriteria: 0.8
difficulty: "beginner"
estimatedDuration: 15
dependencies: []
activities:
  - step: "observe"
    type: "visual_counting"
    order: 1
    content:
      description: "Look at plants and animals"
      items: ["🌳", "🌻", "🐱", "🐦"]
      count: 4
      text: "These are living things."
      hints:
        - "Plants like trees 🌳 and flowers 🌻 are living. Animals like cats 🐱 and birds 🐦 are living too."
        - "Look at which ones are plants and which are animals."
        - "You're close! Remember: plants grow in soil, animals move around."
        - "Try sorting: trees and flowers = plants, cats and birds = animals."
        - ""
  - step: "guided_practice"
    type: "matching"
    order: 2
    content:
      description: "Match each as plant or animal"
      pairs:
        - itemA: "🌳"
          itemB: "Plant"
        - itemA: "🐱"
          itemB: "Animal"
      hints:
        - "The tree 🌳 is a Plant. The cat 🐱 is an Animal."
        - "Look at the first item 🌳 — it grows in the ground."
        - "You're close! Check if 🌳 matches with 'Plant'."
        - "Try thinking: what category does each belong to?"
        - ""
  - step: "independent_practice"
    type: "multiple_choice"
    order: 3
    content:
      questions:
        - question: "Which is a plant?"
          options: ["🐕", "🌻", "🐦"]
          correctIndex: 1
  - step: "mastery_check"
    type: "multiple_choice"
    order: 4
    content:
      questions:
        - question: "Which is an animal?"
          options: ["🌳", "🌻", "🐕"]
          correctIndex: 2
        - question: "What do plants need to grow?"
          options: ["Sunlight", "Toys", "Books"]
          correctIndex: 0
  - step: "positive_completion"
    type: "visual_counting"
    order: 5
    content:
      message: "Nice! You can identify plants and animals."
      encouragement: true

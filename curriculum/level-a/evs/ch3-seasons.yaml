conceptId: seasons
chapter:
  code: CH3
  name: Seasons and Weather
learningObjective: "Identify the four seasons: summer, winter, spring, autumn"
coreIdea: "The year has four seasons that repeat each year"
examples:
  - "Summer is hot and sunny"
  - "Winter is cold and may snow"
misconceptions:
  - "Thinking it snows only in summer"
supports:
  visual: true
masteryCriteria: 0.8
difficulty: "beginner"
estimatedDuration: 15
dependencies: []
activities:
  - step: "observe"
    type: "visual_counting"
    order: 1
    content:
      description: "Look at the four seasons"
      items: ["☀️", "❄️", "🌸", "🍂"]
      count: 4
      text: "Summer, Winter, Spring, Autumn."
  - step: "guided_practice"
    type: "matching"
    order: 2
    content:
      description: "Match season to its weather"
      pairs:
        - itemA: "☀️"
          itemB: "Summer"
        - itemA: "❄️"
          itemB: "Winter"
  - step: "independent_practice"
    type: "multiple_choice"
    order: 3
    content:
      questions:
        - question: "Which season is cold?"
          options: ["☀️", "❄️", "🌸"]
          correctIndex: 1
  - step: "mastery_check"
    type: "multiple_choice"
    order: 4
    content:
      questions:
        - question: "Which season has flowers blooming?"
          options: ["Summer", "Spring", "Winter"]
          correctIndex: 1
        - question: "Which comes after summer?"
          options: ["Spring", "Autumn", "Winter"]
          correctIndex: 1
  - step: "positive_completion"
    type: "visual_counting"
    order: 5
    content:
      message: "Excellent! You know all four seasons."
      encouragement: true

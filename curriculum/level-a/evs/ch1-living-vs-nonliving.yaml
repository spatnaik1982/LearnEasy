conceptId: living_vs_nonliving
chapter:
  code: CH1
  name: Living Things
learningObjective: "Identify living things and non-living things"
coreIdea: "Living things grow, eat, and move"
examples:
  - "A plant is a living thing"
  - "A rock is not a living thing"
misconceptions:
  - "Thinking the sun is alive because it gives light"
supports:
  visual: true
masteryCriteria: 0.8
difficulty: "beginner"
estimatedDuration: 15
dependencies: []
activities:
  - step: "observe"
    type: "visual_counting"
    order: 1
    content:
      description: "Look at living things"
      items: ["🌱", "🐕", "🐦"]
      count: 3
      text: "These are living things."
  - step: "guided_practice"
    type: "matching"
    order: 2
    content:
      description: "Match living and non-living"
      pairs:
        - itemA: "🌱 Plant"
          itemB: "Living"
        - itemA: "🪨 Rock"
          itemB: "Non-living"
  - step: "independent_practice"
    type: "multiple_choice"
    order: 3
    content:
      questions:
        - question: "Which is a living thing?"
          options: ["🪨", "🌱", "🚗"]
          correctIndex: 1
  - step: "mastery_check"
    type: "multiple_choice"
    order: 4
    content:
      questions:
        - question: "Which is NOT a living thing?"
          options: ["🐕", "🪨", "🐦"]
          correctIndex: 1
        - question: "What do living things do?"
          options: ["Grow", "Sleep only", "Stay still"]
          correctIndex: 0
  - step: "positive_completion"
    type: "visual_counting"
    order: 5
    content:
      message: "Great work! You know living and non-living things."
      encouragement: true

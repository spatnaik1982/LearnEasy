conceptId: dressing_for_weather
chapter:
  code: CH3
  name: Seasons and Weather
learningObjective: "Choose appropriate clothing for different weather"
coreIdea: "Wear the right clothes to stay safe and comfortable"
examples:
  - "Wear a raincoat when it rains"
  - "Wear a sweater when it is cold"
misconceptions:
  - "Thinking raincoats are only for winter"
supports:
  visual: true
masteryCriteria: 0.8
difficulty: "beginner"
estimatedDuration: 15
dependencies: []
activities:
  - step: "observe"
    type: "visual_counting"
    order: 1
    content:
      description: "See clothes for different weather"
      items: ["🧥", "☂️", "🩱", "🧣"]
      count: 4
      text: "Jacket, Umbrella, Swimsuit, Scarf."
  - step: "guided_practice"
    type: "matching"
    order: 2
    content:
      description: "Match clothing to weather"
      pairs:
        - itemA: "☂️"
          itemB: "Rainy"
        - itemA: "🧣"
          itemB: "Cold"
  - step: "independent_practice"
    type: "multiple_choice"
    order: 3
    content:
      questions:
        - question: "What do you wear in rain?"
          options: ["🩱", "☂️", "🩳"]
          correctIndex: 1
  - step: "mastery_check"
    type: "multiple_choice"
    order: 4
    content:
      questions:
        - question: "What do you wear in summer?"
          options: ["Heavy coat", "Light clothes", "Wool hat"]
          correctIndex: 1
        - question: "What keeps you warm in winter?"
          options: ["T-shirt", "Sweater", "Sandals"]
          correctIndex: 1
  - step: "positive_completion"
    type: "visual_counting"
    order: 5
    content:
      message: "Well done! You can dress for the weather."
      encouragement: true

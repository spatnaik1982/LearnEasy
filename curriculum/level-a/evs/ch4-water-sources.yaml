conceptId: water_sources
chapter:
  code: CH4
  name: Water and Air
learningObjective: "Identify sources of water: rain, river, tap"
coreIdea: "Water comes from many sources around us"
examples:
  - "Rain is a source of water"
  - "Tap water comes from rivers"
misconceptions:
  - "Thinking all water comes from bottles"
supports:
  visual: true
masteryCriteria: 0.8
difficulty: "beginner"
estimatedDuration: 15
dependencies: []
activities:
  - step: "observe"
    type: "visual_counting"
    order: 1
    content:
      description: "Look at water sources"
      items: ["🌧️", "🏞️", "🚰", "🌊"]
      count: 4
      text: "Rain, River, Tap, Sea."
  - step: "guided_practice"
    type: "matching"
    order: 2
    content:
      description: "Match source to its name"
      pairs:
        - itemA: "🌧️"
          itemB: "Rain"
        - itemA: "🏞️"
          itemB: "River"
  - step: "independent_practice"
    type: "multiple_choice"
    order: 3
    content:
      questions:
        - question: "Where does tap water come from?"
          options: ["🚰", "🌧️", "🏞️"]
          correctIndex: 2
  - step: "mastery_check"
    type: "multiple_choice"
    order: 4
    content:
      questions:
        - question: "Which is a source of water?"
          options: ["Sand", "Rain", "Rocks"]
          correctIndex: 1
        - question: "Where can you find a river?"
          options: ["In the sky", "On land", "In a bottle"]
          correctIndex: 1
  - step: "positive_completion"
    type: "visual_counting"
    order: 5
    content:
      message: "Great! You know where water comes from."
      encouragement: true

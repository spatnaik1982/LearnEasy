conceptId: uses_of_water
chapter:
  code: CH4
  name: Water and Air
learningObjective: "Describe different uses of water in daily life"
coreIdea: "We use water every day for many things"
examples:
  - "We drink water when we are thirsty"
  - "We use water to wash our hands"
misconceptions:
  - "Thinking water is only for drinking"
supports:
  visual: true
masteryCriteria: 0.8
difficulty: "beginner"
estimatedDuration: 15
dependencies: []
activities:
  - step: "observe"
    type: "visual_counting"
    order: 1
    content:
      description: "See how we use water"
      items: ["🚰", "🚿", "🧹", "🌱"]
      count: 4
      text: "Drink, Bathe, Clean, Water plants."
  - step: "guided_practice"
    type: "matching"
    order: 2
    content:
      description: "Match use to picture"
      pairs:
        - itemA: "🚰"
          itemB: "Drinking"
        - itemA: "🌱"
          itemB: "Watering plants"
  - step: "independent_practice"
    type: "multiple_choice"
    order: 3
    content:
      questions:
        - question: "What do we do with water?"
          options: ["Drink it", "Eat it", "Sing to it"]
          correctIndex: 0
  - step: "mastery_check"
    type: "multiple_choice"
    order: 4
    content:
      questions:
        - question: "Why do we need water?"
          options: ["To stay alive", "To play games", "To read"]
          correctIndex: 0
        - question: "How do you use water at home?"
          options: ["Cooking food", "Building toys", "Flying kites"]
          correctIndex: 0
  - step: "positive_completion"
    type: "visual_counting"
    order: 5
    content:
      message: "Wonderful! You know many uses of water."
      encouragement: true

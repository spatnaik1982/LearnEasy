conceptId: length_subtraction
chapter:
  code: CH5
  name: Understanding Length and Subtraction
learningObjective: Subtract lengths from each other
coreIdea: Subtraction of lengths requires proper unit alignment.
examples:
  - 5 km - 2 km = 3 km
  - 300 m - 150 m = 150 m
  - 4 m - 1 m 50 cm = 2 m 50 cm
misconceptions:
  - Students may think that subtraction of lengths can be done without aligning units properly.
  - Students might confuse the units of measurement and subtract lengths in different units without conversion.
  - Students may believe that the result of subtracting lengths must always be in the same unit as the larger length.
supports:
  visual: true
masteryCriteria: 0.8
difficulty: beginner
estimatedDuration: 15
dependencies:
  - length_units
  - length_addition
  - subtraction_1_10
activities:
  - step: observe
    type: visual_counting
    order: 1
    content:
      description: A ruler showing 5 km and 2 km. Subtract lengths carefully! 📏
  - step: guided_practice
    type: fill_blank
    order: 2
    content:
      hints:
        - ""
  - step: independent_practice
    type: fill_blank
    order: 3
    content:
      template: 300 m - 150 m = ___ m.
      blanks:
        - id: length
          position: 0
          correctAnswer: "150"
          options:
            - "150"
            - "100"
            - "200"
            - "50"
      mode: select
  - step: mastery_check
    type: multiple_choice
    order: 4
    content:
      questions:
        - question: What is 4 m - 1 m 50 cm?
          options:
            - 2 m 50 cm
            - 3 m
            - 1 m 50 cm
            - 2 m
          correctIndex: 0
        - question: Which subtraction is correct?
          options:
            - 5 km - 2 km = 3 km
            - 5 km - 2 km = 4 km
            - 5 km - 2 km = 5 km
            - 5 km - 2 km = 2 km
          correctIndex: 0
  - step: positive_completion
    type: visual_counting
    order: 5
    content:
      count: 1
      emoji: 🎉
      items:
        - Great job on subtracting lengths!
      text: You did it! Keep practicing!

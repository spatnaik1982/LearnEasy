conceptId: clock_set_hour
chapter:
  code: CH5
  name: Units of Measurement
learningObjective: Set the hour hand on a clock
coreIdea: The hour hand points to the current hour.
examples:
  - "At 3:00, the hour hand points exactly at 3. 🕐"
  - "At 6:30, the hour hand is halfway between 6 and 7. 🕐"
  - "At 9:15, the hour hand is just past 9. 🕐"
misconceptions:
  - Students may think the hour hand jumps directly to the next hour at the half hour.
  - Students may set the hour hand to the minute value instead of the hour.
  - Students may confuse the hour hand with the minute hand when setting.
supports:
  visual: true
masteryCriteria: 0.8
difficulty: beginner
estimatedDuration: 20
dependencies:
  - clock_reading
  - number_recognition_1_10
activities:
  - step: observe
    type: clock_time
    order: 1
    content:
      hour: 12
      minute: 0
      mode: set
      showDigital: true
      targetTime:
        hour: 12
        minute: 0
      interactive: false
  - step: guided_practice
    type: clock_time
    order: 2
    content:
      hour: 12
      minute: 0
      mode: set
      showDigital: true
      targetTime:
        hour: 3
        minute: 0
      interactive: true
      hints:
        - Move the hour hand to point at 3.
        - The minute hand stays at 12 for a full hour.
        - When the hour hand points at 3, the time is 3:00.
  - step: independent_practice
    type: clock_time
    order: 3
    content:
      hour: 12
      minute: 0
      mode: set
      showDigital: true
      targetTime:
        hour: 6
        minute: 30
      interactive: true
  - step: mastery_check
    type: clock_time
    order: 4
    content:
      hour: 12
      minute: 0
      mode: set
      showDigital: false
      targetTime:
        hour: 9
        minute: 15
      interactive: true
  - step: positive_completion
    type: visual_counting
    order: 5
    content:
      message: Great job setting the clock!
      encouragement: true
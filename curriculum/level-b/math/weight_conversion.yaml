conceptId: weight_conversion
chapter:
  code: CH5
  name: Understanding Weight and Measurement
learningObjective: Convert between different units of weight
coreIdea: You can convert weight from one unit to another using multiplication or division.
examples:
  - 15 g = 15000 mg ➡️ 15 x 1000
  - 2000 mg = 2 g ➡️ 2000 ÷ 1000
  - 5 kg = 5000 g ➡️ 5 x 1000
misconceptions:
  - Students may confuse grams and kilograms, thinking they are the same unit.
  - Students might believe that converting from grams to milligrams requires addition instead of multiplication.
  - >-
    Some learners may think that larger numbers always indicate heavier weights without understanding the unit
    conversion.
supports:
  visual: true
masteryCriteria: 0.8
difficulty: beginner
estimatedDuration: 20
dependencies:
  - weight_units
  - length_conversion
activities:
  - step: observe
    type: visual_counting
    order: 1
    content:
      description: "Observe the weights shown: 1 kg, 1000 g, 500 g. They all represent the same weight! 📏"
  - step: guided_practice
    type: drag_drop
    order: 2
    content:
      hints:
        - ""
  - step: independent_practice
    type: fill_blank
    order: 3
    content:
      template: "Convert 2 kg to grams: 2 kg = ___ g."
      blanks:
        - id: grams
          position: 0
          correctAnswer: "2000"
          options:
            - "1000"
            - "2000"
            - "3000"
            - "4000"
      mode: select
  - step: mastery_check
    type: multiple_choice
    order: 4
    content: {}
  - step: positive_completion
    type: visual_counting
    order: 5
    content:
      count: 1
      emoji: 🎉
      items:
        - Great job! You can convert weights now!
      text: Keep practicing!

conceptId: length_addition
chapter:
  code: CH5
  name: Understanding Lengths and Their Addition
learningObjective: Add different lengths together
coreIdea: Lengths can be added by aligning units properly.
examples:
  - 2 km 300 m + 3 km 200 m = 5 km 500 m
  - 4 m + 3 m 80 cm = 7 m 80 cm
  - 1 km 500 m + 500 m = 2 km
misconceptions:
  - Students may confuse different units of length, such as mixing kilometers with meters.
  - Students might forget to convert all lengths to the same unit before adding them together.
  - Students may struggle with the concept of carrying over when the sum exceeds the next unit (e.g., 100 cm = 1 m).
supports:
  visual: true
masteryCriteria: 0.8
difficulty: beginner
estimatedDuration: 15
dependencies:
  - length_units
  - length_conversion
  - addition_1_10

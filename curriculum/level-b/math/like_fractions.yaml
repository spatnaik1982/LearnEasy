conceptId: like_fractions
chapter:
  code: CH3
  name: Understanding Fractions
learningObjective: Identify and compare like fractions
coreIdea: Like fractions have the same denominator.
examples:
  - 1/5 and 2/5 are like fractions. 🟢
  - 3/8 and 5/8 are like fractions. 🔵
  - 4/10 and 7/10 are like fractions. 🟡
misconceptions:
  - Students may confuse like fractions with unlike fractions due to the presence of different numerators.
  - Some students may think that fractions with the same numerator are like fractions, regardless of the denominator.
  - Students might believe that the size of the numerator determines the size of the fraction, ignoring the denominator.

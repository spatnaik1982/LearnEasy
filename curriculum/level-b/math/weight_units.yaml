conceptId: weight_units
chapter:
  code: CH5
  name: Units of Measurement
learningObjective: Identify different units of weight measurement
coreIdea: Weight can be measured using various standard units.
examples:
  - 1 kg = 1000 g ⚖️
  - 10 g = 10000 mg
  - 1 quintal = 100 kg
misconceptions:
  - Weight is only measured in kilograms and grams, ignoring other units like quintals and milligrams.
  - Students may confuse the conversion factors between different weight units, such as mixing up grams and milligrams.
  - Some may believe that weight measurement is not relevant in daily life, overlooking practical applications.

conceptId: division_basics
chapter:
  code: CH2
  name: Division Basics
learningObjective: Divide one number by another
coreIdea: Division splits a number into equal parts.
examples:
  - 675 plants / 4 plants per child = 168 children.
  - 2548 ÷ 6 = 424 R4.
misconceptions:
  - Division is the same as subtraction.
  - The remainder in division is not important.
  - You can only divide whole numbers.
supports:
  visual: true
masteryCriteria: 0.75
difficulty: beginner
estimatedDuration: 25
dependencies:
  - counting_1_10
  - number_recognition_1_10
  - addition_basics
  - subtraction_basics
  - multiplication_basics
activities:
  - step: observe
    type: visual_counting
    order: 1
    content:
      description: Imagine you have 675 plants. 🌱 How can we share them equally among 4 children?
  - step: guided_practice
    type: story_question
    order: 2
    content:
      hints:
        - ""
  - step: independent_practice
    type: fill_blank
    order: 3
    content:
      template: 675 ÷ 4 = ___ R___
      blanks:
        - id: result
          position: 0
          correctAnswer: "168"
          options:
            - "168"
            - "169"
            - "170"
            - "167"
        - id: remainder
          position: 1
          correctAnswer: "3"
          options:
            - "3"
            - "4"
            - "2"
            - "1"
      mode: select
  - step: mastery_check
    type: multiple_choice
    order: 4
    content: {}
  - step: positive_completion
    type: visual_counting
    order: 5
    content:
      count: 1
      emoji: 🎉
      items:
        - Great job on division! Keep practicing!
      text: You did great! Keep practicing division!

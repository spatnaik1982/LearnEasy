conceptId: place_value_practice
chapter:
  code: CH1
  name: Understanding Place Values
learningObjective: Place digits in the correct place value columns
coreIdea: Each digit in a number has a value based on its position.
examples:
  - "In 18,342, the 1 is in the ten thousands place. 📊"
  - "In 75,406, the 7 is in the ten thousands place. 📊"
  - "In 800,500, the 8 is in the hundred thousands place. 📊"
misconceptions:
  - Students may confuse the place value of digits, thinking that the value is the same regardless of position.
  - Students might overlook the value of zero in a number, believing it contributes to the total value.
  - Students may struggle to translate numbers into words accurately, leading to incorrect representations.
supports:
  visual: true
masteryCriteria: 0.8
difficulty: beginner
estimatedDuration: 25
dependencies:
  - place_value_understanding
  - counting_1_10
activities:
  - step: observe
    type: place_value_chart
    order: 1
    content:
      description: Let's look at the number 5964. 📊
      chart:
        thousands: 5
        hundreds: 9
        tens: 6
        ones: 4
  - step: guided_practice
    type: place_value_chart
    order: 2
    content:
      maxPlaces: lakh
      digits:
        - null
        - null
        - null
        - null
        - 1
        - 8
        - 3
        - 4
        - 2
      targetNumber: 18342
      interactive: true
      hints:

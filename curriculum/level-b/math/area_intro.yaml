conceptId: area_intro
chapter:
  code: CH3
  name: Understanding Area
learningObjective: Find the area of rectangles and squares
coreIdea: Area measures the space inside a shape.
examples:
  - "Area of rectangle: 4 m x 3 m = 12 sq.m 🟩"
  - "Area of square: 5 m x 5 m = 25 sq.m 🟨"
  - "Area of rectangle: 10 m x 8 m = 80 sq.m 🟦"
misconceptions:
  - Students may confuse area with perimeter, thinking they are the same measurement.
  - Students might believe that area can be calculated without considering the dimensions of the shape.
  - >-
    Some students may think that area is only relevant for squares and rectangles, not understanding it applies to other
    shapes as well.
supports:
  visual: true
masteryCriteria: 0.8
difficulty: beginner
estimatedDuration: 25
dependencies:
  - counting_1_10
  - number_recognition_1_10
  - basic_shapes
  - perimeter_intro
activities:

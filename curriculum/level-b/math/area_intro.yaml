    type: grid_area
    order: 1
    content:
      rows: 4
      cols: 3
      mode: area
      interactive: false
  - step: guided_practice
    type: drag_drop
    order: 2
    content:
      hints:
        - ""
  - step: independent_practice
    type: fill_blank
    order: 3
    content:
      template: The area of a rectangle with length 10 m and width 8 m is ___.

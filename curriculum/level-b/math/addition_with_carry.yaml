conceptId: addition_with_carry
chapter:
  code: CH2
  name: Addition and Subtraction Basics
learningObjective: Add numbers with carry over
coreIdea: Carry over occurs when sums exceed place value.
examples:
  - 246 + 367 = 613 with carry from ones to tens.
  - 111 + 424567 + 378639 = 803206.
misconceptions:
  - Students may think that carrying over only applies to the ones place and not to subsequent places.
  - Students might confuse the process of carrying over with simple addition, leading to incorrect sums.
  - Some learners may struggle with the concept of breaking down numbers into tens and ones, causing errors in addition.
supports:
  visual: true
masteryCriteria: 0.8
difficulty: intermediate
estimatedDuration: 15
dependencies:
  - addition_basics
  - counting_1_10
  - number_recognition_1_10
activities:
  - step: observe
    type: visual_counting
    order: 1
    content:
      description: >-
        Let's add 246 and 367. Start with the ones place. 6 + 7 = 13. Write down 3 and carry over 1. Then, 4 + 6 + 1 =
        11. Write down 1 and carry over 1. Finally, 2 + 3 + 1 = 6. The answer is 613! 🎉
  - step: guided_practice
    type: drag_drop
    order: 2
    content:
      hints:
        - ""
  - step: independent_practice
    type: fill_blank
    order: 3
    content:
      template: "Fill in the blanks: 246 + 367 = ____, where the carry from the ones place is ____. "
      blanks:
        - id: result
          position: 0
          correctAnswer: 613
          options:
            - 613
            - 610
            - 620
            - 600
        - id: carry
          position: 1
          correctAnswer: 1
          options:
            - 1
            - 0
            - 2
            - 3
      mode: select
  - step: mastery_check
    type: multiple_choice
    order: 4
    content: {}
  - step: positive_completion
    type: visual_counting
    order: 5
    content:
      description: Great job! You learned how to add with carry over! Keep practicing! 😊

conceptId: multiplication_two_digit
chapter:
  code: CH2
  name: Multiplication and Division Basics
learningObjective: Multiply two-digit numbers
coreIdea: Multiply by breaking down into tens and ones.
examples:
  - 85 x 25 = 2125 by breaking into 85 x 5 and 85 x 20.
  - 182 x 47 = 8554.
misconceptions:
  - >-
    Students may confuse the multiplication of two-digit numbers with single-digit multiplication, leading to incorrect
    calculations.
  - >-
    Some students might not understand how to break down numbers into tens and ones, resulting in difficulty with the
    multiplication process.
  - >-
    Students may forget to carry over values when multiplying, similar to addition, which can lead to errors in their
    final answer.
supports:
  visual: true
masteryCriteria: 0.8
difficulty: intermediate
estimatedDuration: 25
dependencies:
  - addition_basics
  - subtraction_basics
  - multiplication_basics
  - addition_with_carry
activities:
  - step: observe
    type: visual_counting
    order: 1
    content:
      description: >-
        Let's see how to multiply two-digit numbers by breaking them down. For example, 85 x 25 can be split into 85 x 5
        and 85 x 20. 📊
  - step: guided_practice
    type: drag_drop
    order: 2
    content:
      hints:
        - ""
  - step: independent_practice
    type: fill_blank
    order: 3
    content:
      template: To find 85 x 25, first calculate ___ and then ___.
      blanks:
        - id: "1"
          position: 0
          correctAnswer: 85 x 5
          options:
            - 85 x 5
            - 85 x 25
            - 25 x 85
            - 5 x 85
        - id: "2"
          position: 1
          correctAnswer: 85 x 20
          options:
            - 85 x 20
            - 25 x 85
            - 20 x 85
            - 85 x 5
      mode: select
  - step: mastery_check
    type: multiple_choice
    order: 4
    content:
      questions:
        - question: What is 85 x 25?
          options:
            - "2125"
            - "425"
            - "1700"
            - "3000"
          correctIndex: 0
        - question: What do you get when you multiply 182 x 47?
          options:
            - "8554"
            - "9426"
            - "8644"
            - "1234"
          correctIndex: 0
  - step: positive_completion
    type: visual_counting
    order: 5
    content:
      description: Great job! You learned how to multiply two-digit numbers! 🎉

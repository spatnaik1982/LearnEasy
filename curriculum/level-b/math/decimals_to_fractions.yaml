conceptId: decimals_to_fractions
chapter:
  code: CH4
  name: Understanding Decimals and Fractions
learningObjective: Convert decimals to fractions
coreIdea: Decimals can be converted to fractions by removing the decimal point and adjusting the denominator.
examples:
  - 0.5 = 5/10
  - 0.25 = 25/100
  - 0.125 = 125/1000
misconceptions:
  - Decimals cannot be converted to fractions because they are different types of numbers.
  - The decimal point changes the value of the number, making it impossible to convert to a fraction.
  - All decimals can only be represented with a denominator of 10 or 100.
supports:
  visual: true
masteryCriteria: 0.8
difficulty: intermediate
estimatedDuration: 20

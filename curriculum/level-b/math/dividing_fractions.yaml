conceptId: dividing_fractions
chapter:
  code: CH3
  name: Understanding Fractions and Their Operations
learningObjective: Divide fractions by multiplying by the reciprocal
coreIdea: To divide fractions, multiply by the reciprocal of the second fraction.
examples:
  - 1/2 ÷ 1/4 = 1/2 × 4/1 = 2. ➗
  - 3/5 ÷ 2/3 = 3/5 × 3/2 = 9/10. ➗
  - 4/7 ÷ 1/2 = 4/7 × 2/1 = 8/7. ➗
misconceptions:
  - Students may think that dividing fractions is the same as subtracting them.
  - Students may confuse the terms 'reciprocal' and 'inverse' when learning to divide fractions.
  - >-
    Students might believe that the denominator of the result should be the same as the denominator of the second
    fraction.
supports:
  visual: true
masteryCriteria: 0.8
difficulty: intermediate
estimatedDuration: 30
dependencies:

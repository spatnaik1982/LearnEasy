conceptId: fraction_compare
chapter:
  code: CH3
  name: Understanding and Comparing Fractions
learningObjective: Compare two fractions visually
coreIdea: When numerators are the same, the fraction with the smaller denominator is larger.
examples:
  - "1/2 is larger than 1/4 because the pieces are bigger. ⚖️"
  - "1/3 is larger than 1/6 because the pieces are bigger. ⚖️"
  - "1/4 is larger than 1/8 because the pieces are bigger. ⚖️"
misconceptions:
  - Students may think a larger denominator means a larger fraction.
  - Students may think fractions with different numerators and denominators cannot be compared.
  - Students may compare fractions by looking only at the numerator.
supports:
  visual: true
masteryCriteria: 0.8
difficulty: beginner
estimatedDuration: 20
dependencies:
  - fractions_intro
  - comparing_fractions
activities:
  - step: observe
    type: fraction_visual
    order: 1
    content:
      numerator: 1
      denominator: 2
      mode: bar
      label: "1/2"
      compare:
        numerator: 1
        denominator: 4
      showLabel: true
      interactive: false
  - step: guided_practice
    type: fraction_visual
    order: 2
    content:
      numerator: 1
      denominator: 3
      mode: bar
      label: "1/3"
      compare:
        numerator: 1
        denominator: 6
      showLabel: true
      interactive: false
      hints:
        - Look at how much is shaded in each bar.
        - 1/3 has bigger pieces than 1/6.
        - The bar with fewer pieces has larger pieces.
  - step: independent_practice
    type: fraction_visual
    order: 3
    content:
      numerator: 1
      denominator: 4
      mode: bar
      label: "1/4"
      compare:
        numerator: 1
        denominator: 8
      showLabel: true
      interactive: false
  - step: mastery_check
    type: multiple_choice
    order: 4
    content:
      questions:
        - question: "Which is larger: 1/2 or 1/4?"
          options:
            - 1/2
            - 1/4
            - They are equal
            - Cannot tell
          correctIndex: 0
  - step: positive_completion
    type: visual_counting
    order: 5
    content:
      message: Great job comparing fractions!
      encouragement: true
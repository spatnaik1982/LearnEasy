conceptId: forming_numbers
chapter:
  code: CH1
  name: Understanding Numbers from 1000 to 9999
learningObjective: Form smallest and largest numbers from digits
coreIdea: Students learn to create the smallest and largest numbers using given digits.
examples:
  - Digits 1, 3, 5 form 135 (smallest) and 531 (largest)
  - Using 7, 0, 4, 9, 5 gives 40579 (smallest) and 97540 (largest)
  - Digits 5, 0, 0, 4, 0, 0, 6 form 4000056 (smallest) and 6540000 (largest)
misconceptions:
  - >-
    Students may think that the largest number can be formed by simply arranging digits in descending order without
    considering leading zeros.
  - >-
    Some students might believe that the smallest number can include leading zeros, which is incorrect in standard
    numerical representation.
  - Students may confuse the concepts of smallest and largest numbers, leading to incorrect formations.
supports:
  visual: true
masteryCriteria: 0.8
difficulty: intermediate
estimatedDuration: 20
dependencies:
  - writing_numbers_1000_9999
  - place_value_understanding
  - comparing_numbers
  - ascending_order_numbers
  - descending_order
activities:
  - step: observe
    type: place_value_chart
    order: 1
    content:
      title: Understanding Place Value for Numbers
      description: Let's look at how to arrange digits to form the smallest and largest numbers!
      chart:
        columns:
          - Thousands
          - Hundreds
          - Tens
          - Ones
        rows:
          - - 5
            - 3
            - 1
            - 0
          - - 0
            - 1
            - 3
            - 5
  - step: guided_practice
    type: drag_drop
    order: 2
    content:
      task: Arrange the digits 3, 1, and 5 to form the smallest number. Drag the digits to the correct place.
      hints:
        - The correct answer is 135. Let me show you...
        - Look at the first digit carefully.
        - You're close! Check your arrangement of digits.
        - Try starting with the smallest digit first.
        - ""
  - step: independent_practice
    type: sequencing
    order: 3
    content:
      task: Arrange the digits 4, 0, 9, and 5 to form the largest number. Put them in order.
      options:
        - "4059"
        - "9540"
        - "9405"
        - "5904"
  - step: mastery_check
    type: multiple_choice
    order: 4
    content:
      questions:
        - text: What is the smallest number from 5, 0, 0, 4, 0, 0, 6?
          options:
            - "4000056"
            - "6004000"
            - "5004000"
            - "000456"
          correctIndex: 0
        - text: Which number is the largest from 7, 0, 4, 9, 5?
          options:
            - "79540"
            - "97450"
            - "97540"
            - "74950"
          correctIndex: 2
  - step: positive_completion
    type: visual_counting
    order: 5
    content:
      message: Great job! You learned to form numbers! Keep practicing! 🎉

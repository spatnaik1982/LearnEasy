conceptId: conversion_between_units
chapter:
  code: CH5
  name: Measurement and Conversion
learningObjective: Convert between different units of measurement
coreIdea: Understanding conversions helps in practical applications.
examples:
  - 1 m = 100 cm 🔄
  - 1 m² = 10,000 cm² 🔄
  - 1 m³ = 1000 L 🔄
misconceptions:
  - Students may confuse different units of measurement, such as mixing meters and centimeters.
  - >-
    Students might believe that conversions are only necessary in specific contexts, not realizing their everyday
    applications.
  - >-
    Students may struggle with the concept of area and volume conversions, thinking they are the same as linear
    conversions.
supports:
  visual: true
masteryCriteria: 0.8
difficulty: intermediate
estimatedDuration: 20
dependencies:
  - units_of_measurement

conceptId: writing_numbers_1000_9999
chapter:
  code: CH1
  name: Writing Numbers in Words
learningObjective: Write numbers in words from 1000 to 9999
coreIdea: Children will practice converting numbers into words.
examples:
  - 7126 - Seven Thousand One Hundred Twenty Six
  - 6042 - Six Thousand Forty Two
  - 9009 - Nine Thousand Nine
misconceptions:
  - >-
    Students may confuse the order of words when writing numbers in words, such as saying 'One Thousand Two Hundred'
    instead of 'Twelve Hundred'.
  - Students might forget to include 'and' in numbers like 'One Thousand and One'.
  - >-
    Some students may struggle with the concept of place value, leading to errors in writing numbers like 'Two Thousand
    Nine Hundred Eighteen' as 'Two Hundred Nine Eighteen'.
supports:
  visual: true
masteryCriteria: 0.8
difficulty: beginner
estimatedDuration: 20
dependencies:
  - reading_numbers_1000_9999
activities:
  - step: observe
    type: place_value_chart
    order: 1
    content:
      title: Understanding Place Value
      description: Let's look at the number 7126. It has 7 thousands, 1 hundred, 2 tens, and 6 ones. 📊
  - step: guided_practice
    type: drag_drop
    order: 2
    content:
      question: Drag the words to match the number 6042.
      options:
        - Six Thousand
        - Forty
        - Two
        - Six Hundred
      hints:
        - The correct answer is 'Six Thousand, Forty, Two'. Let me show you...
        - Look at the thousands place carefully.
        - You're close! Check your hundreds and tens.
        - Try breaking the number down into parts.
      answerOrder:
        - 0
        - 1
        - 2
  - step: independent_practice
    type: fill_blank
    order: 3
    content:
      question: "Fill in the blanks: 9009 is written as __________ __________ __________."
      answer: Nine Thousand Nine
  - step: mastery_check
    type: multiple_choice
    order: 4
    content:
      questions:
        - text: How do you write 2513 in words?
          options:
            - Two Thousand Five Hundred Thirteen
            - Two Thousand One Hundred Thirty Five
            - Twenty Five Hundred Thirteen
            - Two Thousand Fifty Thirteen
          correctIndex: 0
        - text: What is the word form of 4080?
          options:
            - Four Thousand Eighty
            - Four Hundred Eighty
            - Four Thousand Eighty Two
            - Four Thousand Eighty Eight
          correctIndex: 0
  - step: positive_completion
    type: visual_counting
    order: 5
    content:
      message: Great job! You've learned to write numbers in words! 🎉

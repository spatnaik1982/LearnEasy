# Activity Type Examples
# Reference YAML for all 14 supported activity types.
# Each entry shows the canonical content shape for that type.
# Not a valid curriculum concept — used by the playground page.

- type: visual_counting
  step: observe
  description: >
    Displays a visual array of items for counting.
    Supports single group (items + count), dual groups (left + right for addition),
    and observe-step description-only mode.
  content:
    description: "Count the apples"
    items: ["🍎"]
    count: 5
    text: "There are five apples."

- type: matching
  step: guided_practice
  description: >
    Match items from one category to another.
    Each pair defines an item A and its corresponding item B.
  content:
    description: "Match each as plant or animal"
    pairs:
      - itemA: "🌳"
        itemB: "Plant"
      - itemA: "🐱"
        itemB: "Animal"
      - itemA: "🌻"
        itemB: "Plant"
      - itemA: "🐦"
        itemB: "Animal"

- type: drag_drop
  step: independent_practice
  description: >
    Drag items into their correct group/category.
    Items are shuffled; the user drags each into the correct target zone.
  content:
    description: "Sort items into plants or animals"
    groups:
      - label: "Plants"
        target: ["🌳", "🌻"]
      - label: "Animals"
        target: ["🐱", "🐦"]
    items: ["🌳", "🐱", "🌻", "🐦"]

- type: sequencing
  step: independent_practice
  description: >
    Arrange items in the correct order — story sequence, number order,
    life cycle steps, or any sequential process.
  content:
    description: "Put the plant life cycle in order"
    items:
      - "1. The seed is planted"
      - "2. Water makes it grow"
      - "3. A flower blooms"
    shuffled:
      - "3. A flower blooms"
      - "1. The seed is planted"
      - "2. Water makes it grow"

- type: multiple_choice
  step: mastery_check
  description: >
    Select the correct answer from a set of options.
    Can include one or multiple questions in a single activity.
  content:
    questions:
      - question: "How many apples? 🍎🍎"
        options: ["1", "2", "3", "4"]
        correctIndex: 1
      - question: "How many stars? ⭐⭐⭐⭐⭐"
        options: ["4", "5", "6", "7"]
        correctIndex: 1

- type: story_question
  step: guided_practice
  description: >
    Read or listen to a short story, then answer comprehension questions
    about what happened.
  content:
    story: "Ravi planted a seed. He watered it every day. After one week, a small green plant grew."
    questions:
      - question: "What did Ravi plant?"
        options: ["A flower", "A seed", "A tree"]
        correctIndex: 1
      - question: "What happened after one week?"
        options: ["It rained", "A plant grew", "Ravi went to school"]
        correctIndex: 1

- type: real_world
  step: independent_practice
  description: >
    Apply a learned concept to a real-world scenario.
    The child identifies examples of the concept in their surroundings.
  content:
    description: "Find numbers at home"
    scenario: "Look around your room. Can you find a clock with numbers?"
    prompt: "What numbers do you see on the clock?"
    expectedAnswer: "1 to 12"

- type: fraction_visual
  step: observe
  description: >
    Visual fraction display using bars or circles.
    Supports single fraction display and comparison mode (equivalent fractions).
    Interactive mode lets the child shade portions.
  content:
    numerator: 3
    denominator: 4
    mode: "circle"
    label: "3/4"
    showLabel: true
    interactive: false

- type: place_value_chart
  step: guided_practice
  description: >
    A place value chart up to crore (Indian numbering system).
    Users place digits into the correct place value columns.
    Supports multiple shapes: canonical digit array, place-object map, and table.
  content:
    maxPlaces: crore
    digits: [null, null, null, null, null, 5, 4, 3]
    targetNumber: 543
    interactive: true
    draggableDigits: [5, 4, 3]
    showLabels: true

- type: grid_area
  step: observe
  description: >
    An interactive grid for counting area or perimeter.
    Users click cells to highlight them and count area (filled cells)
    or perimeter (boundary edges).
  content:
    rows: 6
    cols: 8
    mode: "area"
    highlighted:
      - { row: 1, col: 1 }
      - { row: 1, col: 2 }
    interactive: false
    maxHighlights: 48
    cellSize: 40
    showCount: true

- type: chart_reader
  step: observe
  description: >
    Display and interact with bar charts or pictographs.
    In observe mode the chart is static; in interactive mode bars are clickable.
    Supports scoring via correctLabel.
  content:
    type: bar
    data:
      - label: Cricket
        value: 12
        emoji: "🏏"
      - label: Football
        value: 8
        emoji: "⚽"
      - label: Hockey
        value: 5
        emoji: "🏑"
    title: Favorite Sports
    showValues: true
    interactive: false

- type: clock_time
  step: observe
  description: >
    An interactive analog clock for telling time.
    Supports read mode (display a time) and set mode (user moves hands to match target).
    5-minute tolerance on minute positioning.
  content:
    hour: 3
    minute: 45
    mode: "read"
    showDigital: true
    interactive: false
    size: 250

- type: measurement_scale
  step: guided_practice
  description: >
    Read a value from a measurement scale — ruler (cm), thermometer (°C),
    or measuring cylinder (mL). Supports interactive mode where the user
    positions the indicator.
  content:
    type: "ruler"
    min: 0
    max: 30
    step: 1
    unit: "cm"
    value: 12
    interactive: true
    showReading: true
    showLabels: true

- type: fill_blank
  step: independent_practice
  description: >
    Fill in missing values in equations, sequences, or number patterns.
    Supports select mode (pick from options) and type mode (free text entry).
  content:
    template: "3 + ___ = 8"
    blanks:
      - id: "blank_1"
        position: 0
        correctAnswer: "5"
        options: ["3", "4", "5", "6"]
    mode: "select"
